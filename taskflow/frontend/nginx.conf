server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS resolver — forces nginx to re-resolve upstream IPs
    # at runtime instead of caching them at startup (prevents 502 after the
    # api-gateway container is recreated and gets a new IP).
    resolver 127.0.0.11 valid=10s;

    # Proxy API calls to api-gateway
    location /api/ {
        set $upstream http://api-gateway:8090;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Angular routing — serve index.html for all non-file requests
    location / {
        try_files $uri $uri/ /index.html;
    }
}
