networks:
  taskflow-net:
    driver: bridge

volumes:
  mysql_data:
  mongo_data:
  rabbitmq_data:

services:

  # ── DATABASES ──────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: tf-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taskdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - taskflow-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 10

  mongo:
    image: mongo:7
    container_name: tf-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - taskflow-net

  # ── MESSAGE BROKERS ────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: tf-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - taskflow-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: tf-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - taskflow-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: tf-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - taskflow-net

  # ── KEYCLOAK ───────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.3
    container_name: tf-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/taskflow-realm.json:/opt/keycloak/data/import/taskflow-realm.json:ro
    networks:
      - taskflow-net

  # ── CONFIG SERVER ──────────────────────────────────────
  config-server:
    build: ./config-server
    container_name: tf-config
    ports:
      - "8888:8888"
    networks:
      - taskflow-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      retries: 8

  # ── EUREKA ─────────────────────────────────────────────
  eureka-server:
    build: ./eureka-server
    container_name: tf-eureka
    ports:
      - "8761:8761"
    networks:
      - taskflow-net
    depends_on:
      config-server:
        condition: service_healthy

  # ── API GATEWAY ────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: tf-gateway
    ports:
      - "8090:8090"
    networks:
      - taskflow-net
    depends_on:
      - eureka-server
      - keycloak
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/TaskFlow

  # ── TASK SERVICE ───────────────────────────────────────
  task-service:
    build: ./task-service
    container_name: tf-tasks
    ports:
      - "8081:8081"
    networks:
      - taskflow-net
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/taskdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_URI: http://eureka-server:8761/eureka
      RABBITMQ_HOST: rabbitmq
      KAFKA_BOOTSTRAP: kafka:9092
      COMMENT_SERVICE_URL: http://comment-service:3000
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/TaskFlow

  # ── COMMENT SERVICE ────────────────────────────────────
  comment-service:
    build: ./comment-service
    container_name: tf-comments
    ports:
      - "3000:3000"
    networks:
      - taskflow-net
    depends_on:
      - mongo
      - rabbitmq
    environment:
      MONGO_URI: mongodb://mongo:27017/commentdb
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      KAFKA_BROKERS: kafka:9092
      PORT: 3000

  # ── FRONTEND ───────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: tf-frontend
    ports:
      - "4200:80"
    networks:
      - taskflow-net
    depends_on:
      - api-gateway